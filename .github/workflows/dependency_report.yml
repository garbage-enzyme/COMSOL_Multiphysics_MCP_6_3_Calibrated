name: dependency-drift-report

# Information-only workflow. Does not auto-merge or auto-release.
# Produces a report of outdated dependencies for human review.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # actions/setup-python v6.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.14"
          cache: pip
      - name: Install package for metadata inspection
        run: python -m pip install ".[dev]"
      - name: List installed direct dependency versions
        run: python -m pip list --format=freeze
      - name: Check for outdated dependencies
        run: python -m pip list --outdated --format=json
      - name: Verify pip check
        run: python -m pip check

# This workflow opens information only. Dependency updates require a human
# review of the tested_versions manifest, test results, and a recorded decision
# before changing pyproject.toml or the release constraints.
