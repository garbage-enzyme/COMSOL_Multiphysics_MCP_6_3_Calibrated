# Codex MCP example. Replace paths for the local non-editable installation.
[mcp_servers.comsol]
command = 'D:\path\to\python-env\Scripts\comsol-mcp.exe'
args = []

[mcp_servers.comsol.env]
# Edit the one shared project-root settings.json before starting the host.
# An explicit absolute path is useful when the client does not preserve cwd.
COMSOL_MCP_SETTINGS_PATH = 'D:\path\to\COMSOL_Multiphysics_MCP\settings.json'
