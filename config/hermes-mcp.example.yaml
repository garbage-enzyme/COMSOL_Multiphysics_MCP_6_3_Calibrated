# Merge this block into ~/.hermes/config.yaml.
# Install this project first with: python -m pip install .
# Use an absolute executable path because Hermes does not pass a stdio cwd.
mcp_servers:
  comsol:
    command: "D:/path/to/python-env/Scripts/comsol-mcp.exe"
    args: []
    env:
      # Edit the one shared project-root settings.json before starting the host.
      COMSOL_MCP_SETTINGS_PATH: "D:/path/to/COMSOL_Multiphysics_MCP/settings.json"
    connect_timeout: 120
    timeout: 3600
    # COMSOL ownership and model mutation are serialized.
    supports_parallel_tool_calls: false
    # Keep the stdio host stable; durable jobs enforce their own wall limits.
    idle_timeout_seconds: 0
    max_lifetime_seconds: 0
